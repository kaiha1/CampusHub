<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Events</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: linear-gradient(90deg, #4f46e5, #06b6d4);
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    .btn {
      background: white;
      color: #0f172a;
      padding: 10px 15px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .card h3 {
      margin-top: 0;
      color: #06b6d4;
    }

    .empty {
      text-align: center;
      margin-top: 50px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<header>
  <h1>🎉 Events</h1>
  <a class="btn" href="add-event.html">+ Add Event</a>
</header>

<div class="container" id="eventsContainer"></div>

<p class="empty" id="emptyMsg">No events yet. Create one!</p>

<script>
  const container = document.getElementById("eventsContainer");
  const emptyMsg = document.getElementById("emptyMsg");

  let events = JSON.parse(localStorage.getItem("events")) || [];

  function renderEvents() {
    container.innerHTML = "";

    if (events.length === 0) {
      emptyMsg.style.display = "block";
      return;
    } else {
      emptyMsg.style.display = "none";
    }

    events.forEach((event, index) => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h3>${event.title}</h3>
        <p><strong>Date:</strong> ${event.date}</p>
        <p>${event.description}</p>
      `;

      container.appendChild(card);
    });
  }

  renderEvents();
</script>

</body>
</html>
