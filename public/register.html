<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - CampusHub</title>

  <link rel="stylesheet" href="style.css" />

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>

<body>

<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">
      <span class="logo-icon">⬡</span> CampusHub
    </a>

    <ul class="nav-links">
      <li><a href="index.html" class="nav-link">Home</a></li>
      <li><a href="events.html" class="nav-link">Events</a></li>
      <li><a href="login.html" class="nav-link">Login</a></li>
    </ul>
  </div>
</nav>

<section class="auth-wrapper">

  <div class="auth-card fade-up">

    <div class="auth-icon">🎓</div>

    <h2>Create Account</h2>

    <p class="auth-subtitle">
      Join CampusHub and explore academic events.
    </p>

    <form id="registerForm">

      <div class="form-row">

        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="firstName" placeholder="John" />
          <div class="form-error"></div>
        </div>

        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="lastName" placeholder="Doe" />
          <div class="form-error"></div>
        </div>

      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="student@email.com" />
        <div class="form-error"></div>
      </div>

      <div class="form-group">
        <label>Password</label>

        <div class="input-password-wrapper">
          <input type="password" id="password" placeholder="Create password" />
          <button type="button" class="toggle-password">👁️</button>
        </div>

        <div class="strength-bar-wrapper">
          <div class="strength-segment"></div>
          <div class="strength-segment"></div>
          <div class="strength-segment"></div>
          <div class="strength-segment"></div>
        </div>

        <div class="form-error"></div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>

        <div class="input-password-wrapper">
          <input type="password" id="confirmPassword" placeholder="Repeat password" />
          <button type="button" class="toggle-password">👁️</button>
        </div>

        <div class="form-error"></div>
      </div>

      <div class="form-check">
        <input type="checkbox" id="terms">
        <label for="terms">
          I agree to the Terms & Conditions
        </label>
      </div>

      <button type="submit" class="btn-submit">
        Create Account
      </button>

    </form>

    <div class="auth-footer">
      Already have an account?
      <a href="login.html">Login</a>
    </div>

  </div>

</section>

<script src="script.js"></script>

</body>
</html>
